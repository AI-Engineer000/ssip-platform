<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <style>
        body {
            background: #080810;
            color: #F0EEFF;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .error-box {
            max-width: 400px;
        }

        .error-code {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(90deg, #DC2626, #7C3AED);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-text {
            color: #6B6A8A;
            margin: 16px 0 24px;
        }

        .error-link {
            color: #A78BFA;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 24px;
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .error-link:hover {
            background: rgba(124, 58, 237, 0.1);
        }
    </style>
    <script>
        (function () {
            const theme = localStorage.getItem('ssip-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>

<body>
    <div class="error-box">
        <div class="error-code">404</div>
        <h2>Page not found</h2>
        <p class="error-text">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="error-link">← Back to Dashboard</a>
    </div>
</body>

</html>
